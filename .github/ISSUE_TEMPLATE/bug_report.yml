name: Bug report
description: Report a problem in SGAD docs, CLI, schemas, or examples.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Steps, commands, or links that reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Documentation
        - Schema
        - Experiment
        - Agent workflow
        - Other
    validations:
      required: true
