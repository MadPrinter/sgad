name: Feature request
description: Suggest a workflow, governance, schema, or integration improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should SGAD solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Expected risk class
      options:
        - R0
        - R1
        - R2
        - R3
    validations:
      required: true
