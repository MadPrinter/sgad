<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident Response Center</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #20242c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.15;
    }

    h2 {
      font-size: 18px;
      line-height: 1.3;
    }

    .toolbar, .panel {
      border: 1px solid #d8dde6;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgb(28 35 45 / 6%);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr)) auto;
      gap: 10px;
      padding: 12px;
      align-items: end;
      width: 100%;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 16px;
    }

    label {
      display: grid;
      gap: 5px;
      color: #4b5565;
      font-size: 12px;
      font-weight: 650;
    }

    input, select, button {
      height: 38px;
      border-radius: 6px;
      border: 1px solid #c9d1dd;
      background: #fff;
      color: #20242c;
      font: inherit;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 13px;
      border-color: #26384d;
      background: #26384d;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      color: #26384d;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .incident-list, .audit-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .incident, .audit-item {
      border: 1px solid #e0e5ec;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
    }

    .incident-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
    }

    .title {
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .meta, .audit-item {
      color: #596579;
      font-size: 13px;
      line-height: 1.45;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #edf1f6;
      color: #26384d;
      font-size: 12px;
      font-weight: 720;
    }

    .severity-critical, .severity-high {
      background: #fee4d7;
      color: #8d2f12;
    }

    .severity-medium {
      background: #fff0bf;
      color: #755400;
    }

    .status-resolved {
      background: #dff5e7;
      color: #166534;
    }

    .actions {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(160px, 1fr) auto;
      gap: 8px;
      margin-top: 10px;
    }

    .message {
      margin-top: 12px;
      min-height: 20px;
      color: #8d2f12;
      font-size: 13px;
    }

    @media (max-width: 860px) {
      header, .layout {
        display: block;
      }

      .toolbar, .actions {
        grid-template-columns: 1fr;
      }

      .layout > * + * {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Incident Response Center</h1>
        <div class="meta">Multi-tenant incident triage, assignment, audit, and SLA reminders.</div>
      </div>
      <div class="toolbar" aria-label="Request context">
        <label>Tenant
          <input id="tenant" value="tenant-a">
        </label>
        <label>User
          <input id="user" value="user-1">
        </label>
        <label>Role
          <select id="role">
            <option>admin</option>
            <option>responder</option>
            <option>viewer</option>
          </select>
        </label>
        <button class="secondary" id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <section class="layout">
      <div class="panel">
        <h2>Incidents</h2>
        <div id="incidents" class="incident-list"></div>
      </div>

      <aside>
        <section class="panel">
          <h2>Create Incident</h2>
          <form id="create-form">
            <label>Title
              <input name="title" required minlength="3" placeholder="API latency above threshold">
            </label>
            <label>Severity
              <select name="severity">
                <option>low</option>
                <option>medium</option>
                <option>high</option>
                <option>critical</option>
              </select>
            </label>
            <label>Assignee Email
              <input name="assigneeEmail" type="email" placeholder="responder@example.com">
            </label>
            <label>SLA Due At
              <input name="slaDueAt" type="datetime-local">
            </label>
            <button type="submit">Create</button>
          </form>
          <button class="secondary" id="run-reminders" type="button" style="width:100%; margin-top:10px;">Run SLA Reminders</button>
          <div id="message" class="message" role="status"></div>
        </section>

        <section class="panel" style="margin-top:16px;">
          <h2>Audit Log</h2>
          <div id="audit-log" class="audit-list"></div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const contextControls = {
      tenant: document.querySelector("#tenant"),
      user: document.querySelector("#user"),
      role: document.querySelector("#role")
    };
    const incidentsEl = document.querySelector("#incidents");
    const auditEl = document.querySelector("#audit-log");
    const messageEl = document.querySelector("#message");

    function headers() {
      return {
        "content-type": "application/json",
        "x-tenant-id": contextControls.tenant.value,
        "x-user-id": contextControls.user.value,
        "x-role": contextControls.role.value
      };
    }

    async function api(path, options = {}) {
      const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error?.message || payload.error?.code || "Request failed");
      }
      return payload;
    }

    function setMessage(text) {
      messageEl.textContent = text || "";
    }

    async function loadAll() {
      setMessage("");
      try {
        const [{ incidents }, audit] = await Promise.all([
          api("/api/incidents"),
          api("/api/audit-log").catch((error) => ({ events: [], error }))
        ]);
        renderIncidents(incidents);
        renderAudit(audit.events, audit.error);
      } catch (error) {
        setMessage(error.message);
      }
    }

    function renderIncidents(incidents) {
      incidentsEl.innerHTML = "";
      if (incidents.length === 0) {
        incidentsEl.innerHTML = '<div class="meta">No incidents for this tenant.</div>';
        return;
      }
      for (const incident of incidents) {
        const item = document.createElement("article");
        item.className = "incident";
        item.innerHTML = `
          <div class="incident-top">
            <div>
              <div class="title"></div>
              <div class="meta">Assignee: ${incident.assigneeEmail || "Unassigned"} | SLA: ${new Date(incident.slaDueAt).toLocaleString()}</div>
            </div>
            <div class="badges">
              <span class="badge severity-${incident.severity}">${incident.severity}</span>
              <span class="badge status-${incident.status}">${incident.status}</span>
            </div>
          </div>
          <div class="actions">
            <select data-status>
              <option value="investigating">investigating</option>
              <option value="resolved">resolved</option>
            </select>
            <input data-assignee type="email" placeholder="assignee@example.com">
            <button class="secondary" data-apply type="button">Apply</button>
          </div>
        `;
        item.querySelector(".title").textContent = incident.title;
        item.querySelector("[data-apply]").addEventListener("click", async () => {
          try {
            const status = item.querySelector("[data-status]").value;
            const assigneeEmail = item.querySelector("[data-assignee]").value;
            if (assigneeEmail) {
              await api(`/api/incidents/${incident.id}/assign`, {
                method: "PATCH",
                body: JSON.stringify({ assigneeEmail })
              });
            }
            if (status && status !== incident.status) {
              await api(`/api/incidents/${incident.id}/status`, {
                method: "PATCH",
                body: JSON.stringify({ status })
              });
            }
            await loadAll();
          } catch (error) {
            setMessage(error.message);
          }
        });
        incidentsEl.append(item);
      }
    }

    function renderAudit(events, error) {
      auditEl.innerHTML = "";
      if (error) {
        auditEl.innerHTML = '<div class="meta">Audit log requires admin role.</div>';
        return;
      }
      if (events.length === 0) {
        auditEl.innerHTML = '<div class="meta">No audit events for this tenant.</div>';
        return;
      }
      for (const event of events) {
        const item = document.createElement("div");
        item.className = "audit-item";
        item.textContent = `${new Date(event.createdAt).toLocaleString()} | ${event.action} | incident ${event.incidentId}`;
        auditEl.append(item);
      }
    }

    document.querySelector("#create-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const body = Object.fromEntries(form.entries());
      if (!body.assigneeEmail) delete body.assigneeEmail;
      if (body.slaDueAt) body.slaDueAt = new Date(body.slaDueAt).toISOString();
      if (!body.slaDueAt) delete body.slaDueAt;
      try {
        await api("/api/incidents", { method: "POST", body: JSON.stringify(body) });
        event.currentTarget.reset();
        await loadAll();
      } catch (error) {
        setMessage(error.message);
      }
    });

    document.querySelector("#run-reminders").addEventListener("click", async () => {
      try {
        const result = await api("/api/jobs/sla-reminders/run", { method: "POST", body: "{}" });
        setMessage(`Sent ${result.remindedCount} reminder(s).`);
        await loadAll();
      } catch (error) {
        setMessage(error.message);
      }
    });

    document.querySelector("#refresh").addEventListener("click", loadAll);
    for (const control of Object.values(contextControls)) {
      control.addEventListener("change", loadAll);
    }

    loadAll();
  </script>
</body>
</html>
