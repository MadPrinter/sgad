<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident Response Center</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #202124;
    }
    body {
      margin: 0;
    }
    header {
      background: #14342b;
      color: #ffffff;
      padding: 24px clamp(16px, 4vw, 48px);
    }
    main {
      display: grid;
      gap: 24px;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      padding: 24px clamp(16px, 4vw, 48px) 48px;
    }
    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }
    h1 {
      font-size: 28px;
    }
    h2 {
      font-size: 18px;
    }
    section {
      background: #ffffff;
      border: 1px solid #d8d8d2;
      border-radius: 8px;
      padding: 18px;
    }
    form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 650;
    }
    input, select, button {
      font: inherit;
    }
    input, select {
      border: 1px solid #b9b9b0;
      border-radius: 6px;
      padding: 10px;
      min-width: 0;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: #276749;
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: #425466;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stack {
      display: grid;
      gap: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #e4e4de;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #4b5563;
      font-size: 12px;
      text-transform: uppercase;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      background: #e9f2ee;
      color: #14342b;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .critical {
      background: #fee2e2;
      color: #991b1b;
    }
    .high {
      background: #ffedd5;
      color: #9a3412;
    }
    .muted {
      color: #6b7280;
    }
    .error {
      color: #991b1b;
      min-height: 20px;
    }
    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Incident Response Center</h1>
    <p>Tenant-scoped incident operations with RBAC, SLA reminders, and audit evidence.</p>
  </header>
  <main>
    <section>
      <h2>Create Incident</h2>
      <form id="incident-form">
        <label>
          Tenant
          <input name="tenantId" value="tenant-a" required>
        </label>
        <label>
          User
          <input name="userId" value="user-1" required>
        </label>
        <label>
          Role
          <select name="role">
            <option>admin</option>
            <option>responder</option>
            <option>viewer</option>
          </select>
        </label>
        <label>
          Title
          <input name="title" value="Checkout latency above threshold" required>
        </label>
        <label>
          Severity
          <select name="severity">
            <option>low</option>
            <option>medium</option>
            <option selected>high</option>
            <option>critical</option>
          </select>
        </label>
        <label>
          Assignee Email
          <input name="assigneeEmail" type="email" value="responder@example.com">
        </label>
        <label>
          SLA Due
          <input name="slaDueAt" type="datetime-local" required>
        </label>
        <button type="submit">Create</button>
        <button class="secondary" id="run-sla" type="button">Run SLA Reminders</button>
        <div class="error" id="message"></div>
      </form>
    </section>

    <div class="stack">
      <section>
        <div class="toolbar">
          <h2>Incidents</h2>
          <button class="secondary" id="refresh" type="button">Refresh</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Assignee</th>
              <th>SLA Due</th>
            </tr>
          </thead>
          <tbody id="incidents">
            <tr><td colspan="5" class="muted">No incidents loaded.</td></tr>
          </tbody>
        </table>
      </section>

      <section>
        <h2>Audit Log</h2>
        <table>
          <thead>
            <tr>
              <th>Action</th>
              <th>Incident</th>
              <th>User</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="audit-log">
            <tr><td colspan="4" class="muted">No audit entries loaded.</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>
  <script>
    const form = document.querySelector("#incident-form");
    const message = document.querySelector("#message");
    const incidentsBody = document.querySelector("#incidents");
    const auditBody = document.querySelector("#audit-log");
    const dueInput = form.elements.slaDueAt;

    dueInput.value = new Date(Date.now() + 45 * 60 * 1000).toISOString().slice(0, 16);

    function headers() {
      return {
        "content-type": "application/json",
        "x-tenant-id": form.elements.tenantId.value,
        "x-user-id": form.elements.userId.value,
        "x-role": form.elements.role.value,
      };
    }

    async function api(path, options = {}) {
      const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || data.error?.code || "request failed");
      return data;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function severityClass(severity) {
      return severity === "critical" ? "critical" : severity === "high" ? "high" : "";
    }

    async function load() {
      message.textContent = "";
      try {
        const [{ incidents }, { auditLog }] = await Promise.all([
          api("/api/incidents"),
          api("/api/audit-log"),
        ]);
        incidentsBody.innerHTML = incidents.length ? incidents.map((incident) => `
          <tr>
            <td>${escapeHtml(incident.title)}</td>
            <td><span class="pill ${severityClass(incident.severity)}">${escapeHtml(incident.severity)}</span></td>
            <td><span class="pill">${escapeHtml(incident.status)}</span></td>
            <td>${incident.assigneeEmail ? escapeHtml(incident.assigneeEmail) : "<span class='muted'>Unassigned</span>"}</td>
            <td>${new Date(incident.slaDueAt).toLocaleString()}</td>
          </tr>
        `).join("") : "<tr><td colspan='5' class='muted'>No incidents for this tenant.</td></tr>";
        auditBody.innerHTML = auditLog.length ? auditLog.map((entry) => `
          <tr>
            <td>${escapeHtml(entry.action)}</td>
            <td>${escapeHtml(entry.incidentId)}</td>
            <td>${escapeHtml(entry.actorUserId)} <span class="muted">(${escapeHtml(entry.actorRole)})</span></td>
            <td>${new Date(entry.createdAt).toLocaleString()}</td>
          </tr>
        `).join("") : "<tr><td colspan='4' class='muted'>No audit entries for this tenant.</td></tr>";
      } catch (err) {
        message.textContent = err.message;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await api("/api/incidents", {
          method: "POST",
          body: JSON.stringify({
            title: form.elements.title.value,
            severity: form.elements.severity.value,
            assigneeEmail: form.elements.assigneeEmail.value || undefined,
            slaDueAt: new Date(form.elements.slaDueAt.value).toISOString(),
          }),
        });
        await load();
      } catch (err) {
        message.textContent = err.message;
      }
    });

    document.querySelector("#refresh").addEventListener("click", load);
    document.querySelector("#run-sla").addEventListener("click", async () => {
      try {
        const result = await api("/api/jobs/sla-reminders/run", { method: "POST", body: "{}" });
        message.textContent = `SLA reminders sent: ${result.remindedCount}`;
        await load();
      } catch (err) {
        message.textContent = err.message;
      }
    });

    load();
  </script>
</body>
</html>
