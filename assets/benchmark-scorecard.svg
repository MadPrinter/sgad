<svg width="1100" height="420" viewBox="0 0 1100 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SGAD benchmark scorecard</title>
  <desc id="desc">Bar chart comparing OpenSpec, Superpowers, and SGAD benchmark scores.</desc>
  <rect width="1100" height="420" rx="24" fill="#0F172A"/>
  <text x="48" y="62" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Runnable benchmark: Incident Response Center</text>
  <text x="50" y="96" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Same medium-sized system, three workflows, one evaluator.</text>

  <g transform="translate(64 146)">
    <text x="0" y="31" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">OpenSpec</text>
    <rect x="190" y="6" width="740" height="38" rx="19" fill="#1E293B"/>
    <rect x="190" y="6" width="614" height="38" rx="19" fill="#38BDF8"/>
    <text x="950" y="32" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">83</text>
  </g>

  <g transform="translate(64 220)">
    <text x="0" y="31" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Superpowers</text>
    <rect x="190" y="6" width="740" height="38" rx="19" fill="#1E293B"/>
    <rect x="190" y="6" width="577" height="38" rx="19" fill="#22C55E"/>
    <text x="950" y="32" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">78</text>
  </g>

  <g transform="translate(64 294)">
    <text x="0" y="31" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">SGAD v2</text>
    <rect x="190" y="6" width="740" height="38" rx="19" fill="#1E293B"/>
    <rect x="190" y="6" width="703" height="38" rx="19" fill="#F59E0B"/>
    <text x="950" y="32" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">95</text>
  </g>

  <g transform="translate(64 358)">
    <rect width="214" height="34" rx="17" fill="#0EA5E9" fill-opacity="0.16" stroke="#38BDF8"/>
    <text x="20" y="23" fill="#BAE6FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">REST API + frontend</text>
    <rect x="232" width="174" height="34" rx="17" fill="#22C55E" fill-opacity="0.14" stroke="#86EFAC"/>
    <text x="252" y="23" fill="#BBF7D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">RBAC + tenancy</text>
    <rect x="424" width="176" height="34" rx="17" fill="#A855F7" fill-opacity="0.14" stroke="#D8B4FE"/>
    <text x="444" y="23" fill="#E9D5FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">audit + SLA jobs</text>
    <rect x="618" width="132" height="34" rx="17" fill="#F59E0B" fill-opacity="0.14" stroke="#FCD34D"/>
    <text x="638" y="23" fill="#FEF3C7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">real tests</text>
  </g>
</svg>
